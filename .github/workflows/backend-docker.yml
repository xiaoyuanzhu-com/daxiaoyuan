name: backend-docker

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-docker.yml'
    tags:
      - 'backend-v*'
  workflow_dispatch:

concurrency:
  group: backend-docker-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/xiaoyuanzhu-com/dadaxiaoyuan-backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=main-,format=short,enable={{is_default_branch}}
            type=match,pattern=backend-v(.*),group=1
          labels: |
            org.opencontainers.image.title=dadaxiaoyuan-backend
            org.opencontainers.image.description=Backend API for 大大校园
            org.opencontainers.image.source=https://github.com/xiaoyuanzhu-com/dadaxiaoyuan
            org.opencontainers.image.licenses=MIT

      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
